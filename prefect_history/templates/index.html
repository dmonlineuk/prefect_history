<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prefect History Viewer</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 1.5rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }

        /* Stats bar */
        .stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }

        /* Filters */
        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        select, button {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            cursor: pointer;
        }
        select:focus, button:focus { outline: 2px solid var(--accent); }
        button { background: var(--accent); border-color: var(--accent); font-weight: 600; }
        button:hover { opacity: 0.9; }
        .btn-clear { background: transparent; border-color: var(--border); color: var(--muted); }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tr:hover td { background: rgba(59, 130, 246, 0.05); }

        /* State badge */
        .state-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .pagination a, .pagination span {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .pagination a:hover { background: var(--surface); }
        .pagination .active {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
        }
        .pagination .disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }
        .info { color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }

        .htmx-indicator {
            display: none;
            color: var(--accent);
            font-size: 0.85rem;
            margin-left: 0.5rem;
        }
        .htmx-request .htmx-indicator { display: inline; }
    </style>
</head>
<body>
    <h1>Prefect History Viewer</h1>
    <p class="subtitle">Database: {{ db_path }}</p>

    <div class="stats">
        <div class="stat">
            <div class="stat-value">{{ total }}</div>
            <div class="stat-label">Total Runs</div>
        </div>
        <div class="stat">
            <div class="stat-value">{{ in_flight }}</div>
            <div class="stat-label">In-Flight</div>
        </div>
        <div class="stat">
            <div class="stat-value">{{ last_sync.isoformat()[:19] if last_sync else "never" }}</div>
            <div class="stat-label">Last Sync</div>
        </div>
    </div>

    <form class="filters"
          hx-get="/rows"
          hx-target="#results"
          hx-trigger="change from:select, click from:button"
          hx-include="[name]">
        <select name="state">
            <option value="">All States</option>
            {% for s in states %}
            <option value="{{ s }}" {{ "selected" if s == state_filter else "" }}>{{ s }}</option>
            {% endfor %}
        </select>
        <select name="flow">
            <option value="">All Flows</option>
            {% for f in flows %}
            <option value="{{ f }}" {{ "selected" if f == flow_filter else "" }}>{{ f }}</option>
            {% endfor %}
        </select>
        <input type="hidden" name="page" value="1">
        <button type="submit">Filter</button>
        <a href="/" class="btn-clear" style="text-decoration:none">Clear</a>
        <span class="htmx-indicator">Loading...</span>
    </form>

    <div id="results">
        {% include "rows.html" %}
    </div>
</body>
</html>
